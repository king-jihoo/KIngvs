<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>조준점 메이커</title>
    <link rel="stylesheet" href="crosshair.css" />
  </head>
  <body>
    <main class="page">
      <header class="hud">
        <div class="hud__title">조준점 메이커</div>
        <div class="hud__controls">
          <button id="copyBtn" type="button">코드 복사</button>
          <button id="resetBtn" type="button">초기화</button>
        </div>
      </header>

      <section class="layout">
        <div class="preview">
          <div class="crosshair" id="crosshair" aria-label="조준점 미리보기">
            <div class="arm arm--top"></div>
            <div class="arm arm--right"></div>
            <div class="arm arm--bottom"></div>
            <div class="arm arm--left"></div>
            <div class="dot" id="dot"></div>
          </div>
        </div>

        <form class="panel" id="controls">
          <label class="field">
            <span>색상</span>
            <input type="color" id="color" value="#3f88c5" />
          </label>
          <label class="field">
            <span>색 밝기</span>
            <input type="range" id="intensity" min="-0.6" max="0.6" value="0" step="0.01" />
          </label>
          <label class="field field--inline">
            <span>RGB 그대로 보기</span>
            <input type="checkbox" id="pureColor" checked />
          </label>
          <label class="field">
            <span>두께</span>
            <input type="range" id="thickness" min="1" max="12" value="4" step="0.5" />
          </label>
          <label class="field">
            <span>길이</span>
            <input type="range" id="length" min="4" max="40" value="18" step="0.5" />
          </label>
          <label class="field">
            <span>간격</span>
            <input type="range" id="gap" min="0" max="24" value="8" step="0.5" />
          </label>
          <label class="field">
            <span>점 크기</span>
            <input type="range" id="dotSize" min="0" max="16" value="4" step="0.5" />
          </label>
          <label class="field">
            <span>투명도</span>
            <input type="range" id="opacity" min="0.1" max="1" value="0.9" step="0.01" />
          </label>
          <label class="field">
            <span>윤곽선</span>
            <input type="range" id="outline" min="0" max="6" value="2" step="0.5" />
          </label>
          <label class="field">
            <span>윤곽선 투명도</span>
            <input type="range" id="outlineOpacity" min="0" max="1" value="0.65" step="0.01" />
          </label>
          <label class="field">
            <span>회전</span>
            <input type="range" id="rotation" min="0" max="45" value="0" step="1" />
          </label>
        </form>
      </section>

      <section class="output">
        <div class="output__title">발로란트 조준점 코드</div>
        <pre class="output__box" id="output"></pre>
      </section>
    </main>

    <script src="crosshair.js"></script>
  </body>
</html>
